<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:12px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        .inputBlock{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            padding:10px 15px;
            border:none;
            background:#667eea;
            color:white;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#5566cc;
        }

        ul{
            list-style:none;
            padding:0;
            margin-top:20px;
        }

        li{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f3f3f3;
            padding:10px;
            border-radius:6px;
            margin-bottom:8px;
        }

        li.done{
            text-decoration:line-through;
            opacity:0.6;
        }

        .delete{
            background:#ff4d4d;
            padding:5px 8px;
            border-radius:4px;
        }

        .delete:hover{
            background:#e60000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <div class="inputBlock">
        <input id="taskInput" placeholder="Lisa ülesanne">
        <button class='addButton'>Lisa</button>
    </div>
    <ul id="taskList"></ul>
    <script src="script2.js"></script>
</body>
</html>
